<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria Premium & Jogos</title>
    <style>
        :root { --cor-principal: #ff4757; --cor-secundaria: #2ed573; --fundo: #1e272e; --texto: #f1f2f6; }
        body { font-family: 'Poppins', 'Segoe UI', sans-serif; background: var(--fundo); color: var(--texto); margin: 0; padding: 0; text-align: center; overflow-x: hidden; }

        .patrocinadores { background: #111; padding: 10px 0; overflow: hidden; white-space: nowrap; border-bottom: 2px solid var(--cor-principal); }
        .patrocinadores img { height: 40px; margin: 0 30px; filter: grayscale(100%); transition: 0.3s; }
        .patrocinadores img:hover { filter: grayscale(0%); transform: scale(1.1); }

        .container { max-width: 800px; margin: 20px auto; padding: 20px; }
        .tela { display: none; background: rgba(255, 255, 255, 0.05); padding: 30px; border-radius: 20px; backdrop-filter: blur(10px); box-shadow: 0 8px 32px rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); }
        .tela-ativa { display: block; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        h1 { font-size: 2.5em; text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 10px var(--cor-principal); margin-bottom: 10px; }

        #pesquisa { width: 80%; padding: 15px; margin-bottom: 25px; border-radius: 30px; border: none; background: rgba(255,255,255,0.1); color: white; font-size: 16px; text-align: center; box-shadow: inset 0 0 10px rgba(0,0,0,0.5); outline: none; }
        #pesquisa::placeholder { color: #aaa; }
        #pesquisa:focus { box-shadow: 0 0 15px var(--cor-principal); }

        .botoes-menu { display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; flex-wrap: wrap; }
        .botao { padding: 12px 25px; background: linear-gradient(45deg, #ff4757, #ff6b81); color: white; border: none; border-radius: 25px; font-weight: bold; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 15px rgba(255, 71, 87, 0.4); text-decoration: none; display: inline-block; }
        .botao:hover { transform: scale(1.05); box-shadow: 0 6px 20px rgba(255, 71, 87, 0.6); }
        .botao-jogo { background: linear-gradient(45deg, #1e90ff, #70a1ff); box-shadow: 0 4px 15px rgba(30, 144, 255, 0.4); }
        .botao-voltar { background: #576574; box-shadow: none; margin-bottom: 20px; }

        .tag-destaque { background-color: var(--cor-secundaria); color: #111; font-size: 11px; padding: 5px 10px; border-radius: 12px; margin-left: 8px; font-weight: 900; text-transform: uppercase; box-shadow: 0 0 10px var(--cor-secundaria); }

        .grade-fotos { display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; }
        .foto-card { width: 200px; height: 250px; overflow: hidden; border-radius: 15px; border: 2px solid rgba(255,255,255,0.1); position: relative; }
        .foto-card img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .foto-card:hover img { transform: scale(1.1); }

        .jogo-casal { display: flex; align-items: center; justify-content: center; gap: 20px; margin: 40px 0; }
        .slot { width: 180px; height: 230px; background: rgba(0,0,0,0.5); border: 3px dashed #555; border-radius: 15px; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; position: relative; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .slot img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .slot span { font-size: 18px; font-weight: bold; color: #888; z-index: 2; text-align: center; }
        .sinal-mais { font-size: 40px; font-weight: bold; color: var(--cor-principal); text-shadow: 0 0 10px var(--cor-principal); }

        .girando { animation: tremer 0.1s infinite; border-color: var(--cor-secundaria) !important; box-shadow: 0 0 20px var(--cor-secundaria) !important; }
        @keyframes tremer { 0% { transform: translate(1px, 1px) rotate(0deg); } 50% { transform: translate(-1px, -2px) rotate(-1deg); } 100% { transform: translate(-2px, 1px) rotate(1deg); } }

        /* AJUSTES PARA CELULAR */
        @media (max-width: 600px) {
            .container { padding: 10px; }
            .tela { padding: 15px; }
            h1 { font-size: 1.8em; }
            #pesquisa { width: 95%; padding: 12px; }
            .botoes-menu { flex-direction: column; width: 100%; }
            .botao { width: 100%; box-sizing: border-box; }

            /* Jogo na Horizontal (Lado a Lado) */
            .jogo-casal { flex-direction: row; gap: 10px; flex-wrap: nowrap; }
            .slot { width: 120px; height: 160px; } /* Fotos menores para caberem */
            .slot span { font-size: 12px; }
            .sinal-mais { font-size: 30px; margin: 0 5px; }

            /* Ajuste da galeria */
            .foto-card { width: 140px; height: 180px; }
        }
    </style>
</head>
<body>

    <div class="patrocinadores">
        <marquee behavior="scroll" direction="left" scrollamount="8">
            <img src="https://upload.wikimedia.org/wikipedia/commons/a/a6/Logo_NIKE.svg" alt="Nike">
            <img src="https://upload.wikimedia.org/wikipedia/commons/2/2f/Google_2015_logo.svg" alt="Google">
            <img src="https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg" alt="Netflix">
            <img src="https://upload.wikimedia.org/wikipedia/commons/1/1b/Apple_logo_grey.svg" alt="Apple">
        </marquee>
    </div>

    <div class="container">
        <div id="menu" class="tela tela-ativa">
            <h1>🔥 Galeria VIP 🔥</h1>

            <div class="botoes-menu">
                <button class="botao botao-jogo" onclick="mudarTela('tela-jogos')">🎮 Área de Jogos</button>
            </div>

            <input type="text" id="pesquisa" placeholder="Pesquisar por nome..." onkeyup="filtrarNomes()">
            <div id="lista-links" class="grade-fotos"></div>
        </div>

        <div id="tela-jogos" class="tela">
            <a class="botao botao-voltar" onclick="mudarTela('menu')">⬅ Voltar</a>
            <h1>💖 Quem será o Casal? 💖</h1>
            <p>Clique no botão para girar a roleta!</p>

            <div class="jogo-casal">
                <div class="slot" id="slot1">
                    <span>[Sem foto]</span>
                    <img id="img-slot1" src="" alt="Pessoa 1">
                </div>
                <div class="sinal-mais">❤</div>
                <div class="slot" id="slot2">
                    <span>[Sem foto]</span>
                    <img id="img-slot2" src="" alt="Pessoa 2">
                </div>
            </div>

            <button class="botao botao-jogo" id="btn-girar" onclick="girarCasal()" style="font-size: 18px; padding: 15px; width: 100%;">GIRAR ROLETA 🎲</button>
        </div>

        <div id="area-fotos"></div>
    </div>

    <script>
        const dados = {
            "Fotos Aleatorias": ["Fotos/Desconhecido.jpeg", "Fotos/Desconhecido2.jpeg", "Fotos/Desconhecido3.jpeg", "Fotos/Desconhecido4.jpeg", "Fotos/Desconhecido5.jpeg", "Fotos/Desconhecido6.jpeg", "Fotos/Desconhecido7.jpeg", "Fotos/Desconhecido8.jpeg", "Fotos/Desconhecido9.jpeg"],
            "Ligia[Mais 3 fotos]": ["Fotos/Ligia.jpeg", "Fotos/Ligia2.jpeg", "Fotos/Ligia3.jpeg", "Fotos/Ligia4.jpeg", "Fotos/Ligia5.jpeg"],
            "Gabriel": ["Fotos/Capacete.jpeg", "Fotos/Capacete2.jpeg"],
            "Lia[Mais 1 foto]": ["Fotos/Lia.jpeg", "Fotos/Lia2.jpeg","Fotos/Lia3.jpeg", "Fotos/Lia e Melissa.jpeg", "Fotos/Lia4.jpeg", "Fotos/Lia5.jpeg", "Fotos/Lia6.jpeg"],
            "Izake": ["Fotos/Izake.jpeg", "Fotos/Izake2.jpeg", "Fotos/Izake3.jpeg", "Fotos/Izake4.jpeg"],
            "Paulo": ["Fotos/Paulo.jpeg"],
            "Jasmim[Mais 1 foto]": ["Fotos/Jasmim.jpeg", "Fotos/Jasmim2.jpeg", "Fotos/Jasmim3.jpeg", "Fotos/Jasmim4.jpeg", "Fotos/Jasmim5.jpeg"],
            "Lara[Mais 1 foto]": ["Fotos/Lara.jpeg", "Fotos/Lara2.jpeg", "Fotos/Lara3.jpeg", "Fotos/Lara4.jpeg"],
            "Melissa": ["Fotos/Lia e Melissa.jpeg"],
            "Juliana[Mais 3 fotos]": ["Fotos/Juliana.jpeg", "Fotos/Juliana2.jpeg", "Fotos/Juliana3.jpeg", "Fotos/Juliana4.jpeg", "Fotos/Juliana5.jpeg"],
            "Jupar": ["Fotos/Jupar.jpeg"],
            "Davi": ["Fotos/Davi.jpeg"],
            "Clarisse[NOVO]": ["Fotos/Clarisse.jpeg"],
            "Carol[NOVO]": ["Fotos/Carol.jpeg"],
            "Julia[NOVO]": ["Fotos/Julia.jpeg"],
            "Alexicia[NOVO]": ["Fotos/Alexicia.jpeg"],
            "Levi[NOVO]": ["Fotos/Levi.jpeg"],
            "Maxsuel[NOVO]": ["Fotos/Maxsuel.jpeg"]
        };

        const menu = document.getElementById('lista-links');
        const area = document.getElementById('area-fotos');
        let todasAsFotos = [];

        for (let nome in dados) {
            dados[nome].forEach(link => { if(link) todasAsFotos.push(link); });
            let nomeExibicao = nome.replace(/\[(.*?)\]/g, '<span class="tag-destaque">$1</span>');
            let idNome = nome.replace(/[^a-zA-Z0-9]/g, "");

            menu.innerHTML += `<a class="botao item-nome" style="margin: 5px; width: auto;" onclick="mudarTela('${idNome}')">${nomeExibicao}</a>`;

            let htmlFotos = `<div id="${idNome}" class="tela">
                                <a class="botao botao-voltar" onclick="mudarTela('menu')">⬅ Voltar</a>
                                <h2>Álbum de ${nomeExibicao}</h2>
                                <div class="grade-fotos">`;

            dados[nome].forEach(link => {
                if(link) { htmlFotos += `<div class="foto-card"><img src="${link}" onerror="this.src='https://via.placeholder.com/200x250?text=Sem+Foto'"></div>`; }
            });

            htmlFotos += `</div></div>`;
            area.innerHTML += htmlFotos;
        }

        function mudarTela(id) {
            document.querySelectorAll('.tela').forEach(t => t.classList.remove('tela-ativa'));
            document.getElementById(id).classList.add('tela-ativa');
            if(id === 'menu') {
                document.getElementById('pesquisa').value = '';
                filtrarNomes();
            }
        }

        function filtrarNomes() {
            let input = document.getElementById('pesquisa').value.toLowerCase();
            let botoes = document.getElementsByClassName('item-nome');
            for (let i = 0; i < botoes.length; i++) {
                let texto = botoes[i].textContent || botoes[i].innerText;
                botoes[i].style.display = texto.toLowerCase().includes(input) ? "inline-block" : "none";
            }
        }

        let girando = false;
        function girarCasal() {
            if (girando || todasAsFotos.length < 2) return;
            girando = true;
            document.getElementById('btn-girar').innerText = "GIRANDO... ⏳";

            const slot1 = document.getElementById('slot1');
            const slot2 = document.getElementById('slot2');
            const img1 = document.getElementById('img-slot1');
            const img2 = document.getElementById('img-slot2');

            img1.src = todasAsFotos[Math.floor(Math.random() * todasAsFotos.length)];
            img2.src = todasAsFotos[Math.floor(Math.random() * todasAsFotos.length)];

            slot1.querySelector('span').style.display = 'none';
            slot2.querySelector('span').style.display = 'none';
            img1.style.display = 'block';
            img2.style.display = 'block';

            slot1.classList.add('girando');
            slot2.classList.add('girando');

            let intervaloRoleta = setInterval(() => {
                img1.src = todasAsFotos[Math.floor(Math.random() * todasAsFotos.length)] || "https://via.placeholder.com/200x250";
                img2.src = todasAsFotos[Math.floor(Math.random() * todasAsFotos.length)] || "https://via.placeholder.com/200x250";
            }, 100);

            setTimeout(() => {
                slot1.classList.remove('girando');
            }, 2000);

            setTimeout(() => {
                clearInterval(intervaloRoleta);
                slot2.classList.remove('girando');
                document.getElementById('btn-girar').innerText = "NOVO CASAL? GIRAR! 🎲";
                girando = false;
            }, 3500);
        }
    </script>
</body>
</html>

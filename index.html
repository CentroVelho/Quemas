<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const sb = supabase.createClient('https://qhcmokmkgzvdwkygiekg.supabase.co', 'sb_publishable_JorRZtpYrnZXn4sSaSzodA_GBx3-r99');
    let timerRanking = null;

    // Gera um ID persistente ou recupera do localStorage
    let deviceId = localStorage.getItem('user_id');
    if (!deviceId) {
        deviceId = 'device_' + Math.random().toString(36).substr(2, 9) + Date.now();
        localStorage.setItem('user_id', deviceId);
    }

    // Cria a tela de Ranking (SEM O TÍTULO)
    if (!document.getElementById('tela-ranking')) {
        document.querySelector('.container').insertAdjacentHTML('beforeend',
            '<div id="tela-ranking" class="tela">' +
                '<a class="botao botao-voltar" onclick="mudarTela(\'menu\')">⬅ Voltar</a>' +
                '<div id="lista-ranking"></div>' +
            '</div>'
        );
        document.querySelector('.botoes-menu').insertAdjacentHTML('beforeend', '<button class="botao" onclick="mudarTela(\'tela-ranking\')">🏆 Tabela</button>');
    }

    // Função que desenha o ranking e coloca os botões
    async function atualizarRanking() {
        const { data } = await sb.from('ranking').select('*').order('votos', { ascending: false });
        if (!data) return;

        let html = '';
        data.forEach((p, index) => {
            let idAlbum = p.nome.replace(/[^a-zA-Z0-9]/g, "");
            let posicao = index + 1;
            let estilo = (index === 0) ? "background: linear-gradient(45deg, #ffd700, #ff8c00); color: #000; transform: scale(1.05);" :
                         (index === 1) ? "background: #c0c0c0; color: #000;" :
                         (index === 2) ? "background: #cd7f32; color: #fff;" : "background: #333; color: #fff;";
            let destaque = (index === 0) ? "👑 1º LUGAR" : (index === 1) ? "🥈 2º LUGAR" : (index === 2) ? "🥉 3º LUGAR" : `📍 ${posicao}º LUGAR`;

            html += `
            <div class="card" id="card-${idAlbum}" style="${estilo} margin:15px 0; padding:15px; border-radius:15px; font-weight:bold;">
                <div style="font-size: 0.8em; margin-bottom:5px;">${destaque}</div>
                <div style="margin:5px 0; font-size: 1.2em;">${p.nome}: <b id="votos-${idAlbum}">${p.votos} votos</b></div>
                <div style="display:flex; gap:10px; justify-content:center; margin-top:10px;">
                    <button class="botao" id="btn-${idAlbum}" onclick="votar(this, '${p.nome}', '${idAlbum}')">⭐ Votar</button>
                    <button class="botao" style="background: #2ed573;" onclick="mudarTela('${idAlbum}')">📸 Ver Fotos</button>
                </div>
            </div>`;
        });
        document.getElementById('lista-ranking').innerHTML = html;
    }

    // Função de votação blindada
    async function votar(btn, nome, idAlbum) {
        btn.disabled = true;
        btn.innerText = "Verificando...";

        // 1. Verifica no servidor se o dispositivo já existe no registro
        const { data: jaVotou } = await sb.from('votos_registrados').select('id_dispositivo').eq('id_dispositivo', deviceId);

        if (jaVotou && jaVotou.length > 0) {
            alert("Você já votou! Agradecemos sua participação.");
            btn.innerText = "Votado ✅";
            return;
        }

        btn.innerText = "Votando...";
        const navInfo = navigator.userAgent;

        // 2. Registra o voto
        const { data: atual } = await sb.from('ranking').select('votos').eq('nome', nome).single();
        const novoVoto = (atual ? atual.votos : 0) + 1;

        await sb.from('ranking').update({ votos: novoVoto }).eq('nome', nome);
        await sb.from('votos_registrados').insert([{ id_dispositivo: deviceId, user_agent: navInfo }]);

        // 3. Feedback visual
        document.getElementById(`votos-${idAlbum}`).innerText = novoVoto + " votos";
        btn.innerText = "Votado ✅";

        // 4. Só reordena o ranking após 5 segundos de inatividade
        clearTimeout(timerRanking);
        timerRanking = setTimeout(atualizarRanking, 5000);
    }

    atualizarRanking();
</script>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria de Quemas</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f4f9; padding: 20px; text-align: center; }
        .tela { display: none; background: white; max-width: 600px; margin: auto; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .tela-ativa { display: block; }

        h1, h2 { color: #333; }

        .botao-link {
            display: inline-block; margin: 10px; padding: 12px 25px;
            background: #007BFF; color: white; border-radius: 25px;
            text-decoration: none; cursor: pointer; transition: 0.3s;
        }
        .botao-link:hover { background: #0056b3; transform: scale(1.05); }
        .botao-voltar { background: #6c757d; margin-bottom: 20px; }

        /* Ajuste para as fotos ficarem grandes e na vertical */
        .foto {
            width: 90%;
            max-width: 400px;
            margin: 15px auto;
            display: block;
        }
        .foto img {
            width: 100%;
            border-radius: 10px;
            border: 3px solid #eee;
            transition: 0.3s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <div id="menu" class="tela tela-ativa">
        <h1>Galeria de Quemas</h1>
        <p>Escolha uma categoria:</p>
        <div id="lista-links"></div>
    </div>

    <div id="area-fotos"></div>

    <script>
        // --- AQUI VOCÊ ADICIONA AS FOTOS ---
        const dados = {
            "Desconhecidos": ["Fotos/Desconhecido.jpeg", "Fotos/Desconhecido2.jpeg", "Fotos/Desconhecido3.jpeg", "Fotos/Desconhecido4.jpeg", "Fotos/Desconhecido5.jpeg", "Fotos/Desconhecido6.jpeg", "Fotos/Desconhecido7.jpeg", "Fotos/Desconhecido8.jpeg", "Fotos/Desconhecido9.jpeg"],
            "Ligia": ["Fotos/Ligia.jpeg", "Fotos/Ligia2.jpeg"],
            "Capacete": ["Fotos/Capacete.jpeg", "Fotos/Capacete2.jpeg"],
            "Lia": ["Fotos/Lia.jpeg", "Fotos/Lia2.jpeg","Fotos/Lia3.jpeg", "Fotos/Lia e Melissa.jpeg", "Fotos/Lia4.jpeg"],
            "Izake": ["Fotos/Izake.jpeg", "Fotos/Izake2.jpeg", "Fotos/Izake3.jpeg"],
            "Paulo": ["Fotos/Paulo.jpeg"],
            "Jasmim": ["Fotos/Jasmim.jpeg", "Fotos/Jasmim2.jpeg", "Fotos/Jasmim3.jpeg", "Fotos/Jasmim4.jpeg"],
            "Lara": ["Fotos/Lara.jpeg", "Fotos/Lara2.jpeg", "Fotos/Lara3.jpeg"],
            "Melissa": ["Fotos/Lia e Melissa.jpeg"],
            "Juliana": ["Fotos/Juliana.jpeg", "Fotos/Juliana2.jpeg"],
            "Jupar": ["Fotos/Jupar.jpeg"]
        };
        // ------------------------------------

        const menu = document.getElementById('lista-links');
        const area = document.getElementById('area-fotos');

        for (let nome in dados) {
            menu.innerHTML += `<a class="botao-link" onclick="mudarTela('${nome}')">${nome}</a>`;

            let htmlFotos = `<div id="${nome}" class="tela">
                                <a class="botao-link botao-voltar" onclick="mudarTela('menu')">⬅ Voltar</a>
                                <h2>Quemas de ${nome}</h2>`;

            dados[nome].forEach(link => {
                if(link) { // Só cria o div se tiver link
                    htmlFotos += `<div class="foto"><img src="${link}" alt="Quemas de ${nome}"></div>`;
                }
            });

            htmlFotos += `</div>`;
            area.innerHTML += htmlFotos;
        }

        function mudarTela(id) {
            document.querySelectorAll('.tela').forEach(t => t.classList.remove('tela-ativa'));
            document.getElementById(id).classList.add('tela-ativa');
        }
    </script>
</body>
</html>
